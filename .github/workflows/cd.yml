on: 
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - name: build app 
        run: scripts/buildprod.sh